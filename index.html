<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>181.FM Digital Jukebox</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    font-family:Arial,Helvetica,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Background glow */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#ff004c55,transparent 40%),
    radial-gradient(circle at bottom,#00c8ff44,transparent 45%);
}

/* Jukebox */

.jukebox{
    width:760px;
    border-radius:30px;
    overflow:hidden;
    border:10px solid silver;
    background:linear-gradient(#d8d8d8,#555);
    box-shadow:
    0 0 20px #fff,
    0 0 60px #00d9ff,
    0 0 100px #ff0055;
}

/* LED BAR */

.ledbar{
    height:18px;
    background:
    repeating-linear-gradient(
    90deg,
    #ff0000 0 10px,
    #ffff00 10px 20px,
    #00ff00 20px 30px,
    #00ccff 30px 40px,
    #ff00ff 40px 50px);
    animation:ledmove 1s linear infinite;
}

@keyframes ledmove{
    from{background-position:0;}
    to{background-position:200px;}
}

/* Top section */

.top{
    background:
    radial-gradient(circle,#ff4a4a,#5a0000);
    padding:30px;
    text-align:center;
    color:white;
}

.title{
    font-size:42px;
    font-weight:bold;
    text-shadow:
    0 0 10px white,
    0 0 20px white;
}

.subtitle{
    margin-top:10px;
    color:#ffeaa0;
    font-size:18px;
}

/* Fake record */

.record-area{
    height:180px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle,#660000,#220000);
}

.record{
    width:140px;
    height:140px;
    border-radius:50%;
    background:
    radial-gradient(circle,#ddd 0 15px,#111 16px 100%);
    animation:spin 4s linear infinite;
}

.record.stop{
    animation:none;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* Display */

.display{
    background:#101010;
    color:#00ff66;
    text-align:center;
    font-size:26px;
    font-weight:bold;
    padding:16px;
    border-top:3px solid #444;
    border-bottom:3px solid #444;
    text-shadow:0 0 10px #00ff66;
}

/* Buttons */

.buttons{
    padding:25px;
    background:
    linear-gradient(#2a2a2a,#111);
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
}

.stream-btn{
    border:none;
    border-radius:12px;
    padding:18px;
    cursor:pointer;
    color:white;
    font-size:22px;
    font-weight:bold;

    background:
    linear-gradient(#4a4a4a,#181818);

    box-shadow:
    0 0 15px #00c8ff;

    transition:.25s;
}

.stream-btn:hover{
    transform:scale(1.03);

    box-shadow:
    0 0 25px #00ffff,
    0 0 40px #00ffff;
}

.stream-btn.active{
    background:
    linear-gradient(#00c853,#006c2e);

    box-shadow:
    0 0 15px #00ff66,
    0 0 35px #00ff66,
    0 0 60px #00ff66;

    animation:pulse 1s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }
}

/* Bottom */

.bottom{
    text-align:center;
    color:#ddd;
    padding:18px;
    background:#111;
    font-size:15px;
}

/* Decorative columns */

.columns{
    display:flex;
    justify-content:space-around;
    background:linear-gradient(#777,#ddd);
    padding:10px 0;
}

.column{
    width:28px;
    height:120px;
    border-radius:20px;
    background:
    linear-gradient(
    90deg,
    #666,
    #fff,
    #777);

    box-shadow:
    0 0 20px #ffffff88;
}

</style>
</head>

<body>

<div class="jukebox">

    <div class="ledbar"></div>

    <div class="top">
        <div class="title">
            181.FM DIGITAL JUKEBOX
        </div>

        <div class="subtitle">
            CLICK TO PLAY • CLICK AGAIN TO STOP
        </div>
    </div>

    <div class="record-area">
        <div class="record stop" id="record"></div>
    </div>

    <div class="display" id="display">
        NOW PLAYING : NONE
    </div>

    <div class="buttons">

        <button class="stream-btn"
        data-name="SOUL"
        data-stream="http://www.181.fm/stream/asx/181-soul">
        SOUL
        </button>

        <button class="stream-btn"
        data-name="SUPER 70'S"
        data-stream="http://www.181.fm/stream/asx/181-70s">
        SUPER 70'S
        </button>

        <button class="stream-btn"
        data-name="AWESOME 80'S"
        data-stream="http://www.181.fm/stream/asx/181-awesome80s">
        AWESOME 80'S
        </button>

        <button class="stream-btn"
        data-name="STAR 90'S"
        data-stream="http://www.181.fm/stream/asx/181-star90s">
        STAR 90'S
        </button>

        <button class="stream-btn"
        data-name="POWER 181 TOP 40"
        data-stream="http://www.181.fm/stream/asx/181-power">
        POWER 181 TOP 40
        </button>

        <button class="stream-btn"
        data-name="THE HEART"
        data-stream="http://www.181.fm/stream/asx/181-heart">
        THE HEART
        </button>

    </div>

    <div class="columns">
        <div class="column"></div>
        <div class="column"></div>
        <div class="column"></div>
    </div>

    <div class="bottom">
        181.FM RETRO DIGITAL JUKEBOX
    </div>

    <div class="ledbar"></div>

</div>

<audio id="player"></audio>

<script>

const player =
document.getElementById("player");

const display =
document.getElementById("display");

const record =
document.getElementById("record");

const buttons =
document.querySelectorAll(".stream-btn");

let activeButton = null;

buttons.forEach(button=>{

    button.addEventListener("click",()=>{

        const stream =
        button.dataset.stream;

        const name =
        button.dataset.name;

        if(activeButton===button){

            player.pause();
            player.src="";

            button.classList.remove("active");

            activeButton=null;

            display.innerHTML=
            "NOW PLAYING : NONE";

            record.classList.add("stop");

            return;
        }

        buttons.forEach(btn=>
        btn.classList.remove("active"));

        player.src=stream;
        player.play();

        button.classList.add("active");

        activeButton=button;

        display.innerHTML=
        "NOW PLAYING : " + name;

        record.classList.remove("stop");

    });

});

</script>

</body>
</html>
